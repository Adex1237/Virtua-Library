<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero-section" id="hero-header">
        <div class="header-top">
            <div class="header-title">
                <i class="fa-solid fa-bars-staggered"></i>
                <h3>Biblioteca Virtual</h3>
            </div>
            
            <button id="dark-mode-toggle" aria-label="Cambiar modo de color">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <div id="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" placeholder="Buscar archivos, documentos, videos, audios...">
        </div>
    </header>

    <div id="categories">
        <button class="btn-category active" data-category="todos">
            <i class="fa-solid fa-folder-open"></i>
            <span class="btn-text">Todos</span>
            <span class="badge" id="badge-todos">...</span> 
        </button>

        <button class="btn-category" data-category="documentos">
            <i class="fa-solid fa-file-lines"></i>
            <span class="btn-text">Documentos</span>
            <span class="badge" id="badge-documentos">...</span>
        </button>

        <button class="btn-category" data-category="videos">
            <i class="fa-solid fa-video"></i>
            <span class="btn-text">Videos</span>
            <span class="badge" id="badge-videos">...</span>
        </button>

        <button class="btn-category" data-category="audio">
            <i class="fa-solid fa-music"></i>
            <span class="btn-text">Audio</span>
            <span class="badge" id="badge-audio">...</span>
        </button>

        <button class="btn-category" data-category="imagenes">
            <i class="fa-solid fa-image"></i>
            <span class="btn-text">Imágenes</span>
            <span class="badge" id="badge-imagenes">...</span>
        </button>

        <button class="btn-category" data-category="juegos">
            <i class="fa-solid fa-gamepad"></i>
            <span class="btn-text">Juegos</span>
            <span class="badge" id="badge-juegos">...</span>
        </button>

        <button class="btn-category" data-category="otros">
            <i class="fa-solid fa-ellipsis"></i>
            <span class="btn-text">Otros</span>
            <span class="badge" id="badge-otros">...</span>
        </button>
    </div>

    <div id="content">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
