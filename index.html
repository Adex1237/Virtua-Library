<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero-section">
        <div class="header-title">
            <i class="fa-solid fa-bars-staggered"></i>
            <h3>Biblioteca Virdual</h3>
        </div>

        <div id="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" placeholder="Buscar archivos, documentos, videos, audios...">
        </div>
    </header>

    <div id="categories">
        <button class="btn-category active">
            <i class="fa-solid fa-folder-open"></i>
            <span class="btn-text">Todos</span>
            <!-- Se agregó el id="badge-todos" -->
            <span class="badge" id="badge-todos">...</span> 
        </button>

        <button class="btn-category">
            <i class="fa-solid fa-file-lines"></i>
            <span class="btn-text">Documentos</span>
            <!-- Se agregó el id="badge-documentos" -->
            <span class="badge" id="badge-documentos">...</span>
        </button>

        <button class="btn-category">
            <i class="fa-solid fa-video"></i>
            <span class="btn-text">Videos</span>
            <!-- Se agregó el id="badge-videos" -->
            <span class="badge" id="badge-videos">...</span>
        </button>

        <button class="btn-category">
            <i class="fa-solid fa-music"></i>
            <span class="btn-text">Audio</span>
            <!-- Se agregó el id="badge-audio" -->
            <span class="badge" id="badge-audio">...</span>
        </button>

        <button class="btn-category">
            <i class="fa-solid fa-image"></i>
            <span class="btn-text">Imágenes</span>
            <!-- Se agregó el id="badge-imagenes" -->
            <span class="badge" id="badge-imagenes">...</span>
        </button>

        <button class="btn-category">
            <i class="fa-solid fa-gamepad"></i>
            <span class="btn-text">Juegos</span>
            <!-- Se agregó el id="badge-juegos" -->
            <span class="badge" id="badge-juegos">...</span>
        </button>

        <button class="btn-category">
            <i class="fa-solid fa-ellipsis"></i>
            <span class="btn-text">Otros</span>
            <!-- Se agregó el id="badge-otros" -->
            <span class="badge" id="badge-otros">...</span>
        </button>
    </div>

    <div id="content">
        <div class="video-card">
            <iframe src="https://drive.google.com/file/d/11VSnzC8H-PJcycXPgp3bKQXzfGCG399j/preview" 
                    allow="autoplay" 
                    scrolling="no">
            </iframe>
            <div class="video-info">
                <h4>No Tenemos Feria</h4>
                <p>Categoría • Tamaño MB</p>
            </div>
        </div>

        <div class="video-card">
            <iframe src="https://drive.google.com/file/d/1HvpfPmsSZAeORSh7SbZP26H1pMImgl3Z/preview" 
                    allow="autoplay" 
                    scrolling="no">
            </iframe>
            <div class="video-info">
                <h4>Corpse bride  Los mal aventurados no lloran - Pay (144p, h264)</h4>
                <p>Categoría • Tamaño MB</p>
            </div>
        </div>

        <div class="video-card">
            <iframe src="https://drive.google.com/file/d/1qwHSBJm9zmmX_S_5PcdMlF8DxtbnbVnE/preview" 
                    allow="autoplay" 
                    scrolling="no">
            </iframe>
            <div class="video-info">
                <h4>Toño Fox - Yo soy Joto</h4>
                <p>Categoría • Tamaño MB</p>
            </div>
        </div>

        <div class="video-card">
            <iframe src="https://drive.google.com/file/d/1-nu8724idC0y96P7fl_FxzzSZMK6mhZR/preview" 
                    allow="autoplay" 
                    scrolling="no">
            </iframe>
            <div class="video-info">
                <h4>Mencho</h4>
                <p>Categoría • Tamaño MB</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
